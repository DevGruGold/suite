name: Deploy Supabase

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/**'
      - '.github/workflows/deploy-edge-functions.yml'
  workflow_dispatch:

concurrency:
  group: supabase-deploy-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  supabase-preflight:
    name: Supabase preflight
    runs-on: ubuntu-latest
    outputs:
      ready: ${{ steps.check.outputs.ready }}

    steps:
      - name: Check required Supabase secrets
        id: check
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
        run: |
          if [ -n "$SUPABASE_ACCESS_TOKEN" ] && [ -n "$SUPABASE_DB_PASSWORD" ] && [ -n "$SUPABASE_PROJECT_ID" ]; then
            echo 'ready=true' >> "$GITHUB_OUTPUT"
          else
            echo 'ready=false' >> "$GITHUB_OUTPUT"
          fi

  deploy-supabase:
    name: Deploy migrations and edge functions
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: supabase-preflight
    if: needs.supabase-preflight.outputs.ready == 'true'
    environment: production
    env:
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID"

      - name: Dry-run database changes
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: supabase db push --dry-run

      - name: Apply database migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: supabase db push

      - name: Deploy edge functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        shell: bash
        run: |
          shopt -s nullglob
          for entry in supabase/functions/*; do
            if [ -d "$entry" ] && [ -f "$entry/index.ts" ]; then
              function_name=$(basename "$entry")
              echo "Deploying ${function_name}"
              supabase functions deploy "$function_name" --project-ref "$SUPABASE_PROJECT_ID"
            fi
          done

  supabase-deployment-summary:
    name: Supabase deployment summary
    runs-on: ubuntu-latest
    needs:
      - supabase-preflight
      - deploy-supabase
    if: always()

    steps:
      - name: Summarize deployment status
        run: |
          if [ "${{ needs.supabase-preflight.outputs.ready }}" != 'true' ]; then
            echo 'Supabase deployment skipped because one or more required secrets are not configured.'
          elif [ "${{ needs.deploy-supabase.result }}" = 'success' ]; then
            echo 'Supabase deployment completed successfully.'
          else
            echo 'Supabase deployment failed.'
            exit 1
          fi
