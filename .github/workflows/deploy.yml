name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deployment-preflight:
    name: Deployment preflight
    runs-on: ubuntu-latest
    outputs:
      ready: ${{ steps.check.outputs.ready }}

    steps:
      - name: Check required Vercel secrets
        id: check
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          if [ -n "$VERCEL_TOKEN" ] && [ -n "$VERCEL_ORG_ID" ] && [ -n "$VERCEL_PROJECT_ID" ]; then
            echo 'ready=true' >> "$GITHUB_OUTPUT"
          else
            echo 'ready=false' >> "$GITHUB_OUTPUT"
          fi

  deploy-vercel:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: deployment-preflight
    if: needs.deployment-preflight.outputs.ready == 'true'
    environment: production
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Set up project
        uses: ./.github/actions/setup-node-install

      - name: Build application
        run: npm run build

      - name: Deploy to Vercel
        run: |
          npm install --global vercel@latest
          vercel pull --yes --environment=production --token="${{ secrets.VERCEL_TOKEN }}"
          vercel build --prod --token="${{ secrets.VERCEL_TOKEN }}"
          vercel deploy --prebuilt --prod --token="${{ secrets.VERCEL_TOKEN }}"

  deployment-summary:
    name: Deployment summary
    runs-on: ubuntu-latest
    needs:
      - deployment-preflight
      - deploy-vercel
    if: always()

    steps:
      - name: Summarize deployment status
        run: |
          if [ "${{ needs.deployment-preflight.outputs.ready }}" != 'true' ]; then
            echo 'Vercel deployment skipped because one or more required secrets are not configured.'
          elif [ "${{ needs.deploy-vercel.result }}" = 'success' ]; then
            echo 'Vercel deployment completed successfully.'
          else
            echo 'Vercel deployment failed.'
            exit 1
          fi
