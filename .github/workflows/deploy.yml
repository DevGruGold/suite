name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy-vercel:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: ${{ secrets.VERCEL_TOKEN != '' && secrets.VERCEL_ORG_ID != '' && secrets.VERCEL_PROJECT_ID != '' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Deploy to Vercel
        run: |
          npm install --global vercel@latest
          vercel pull --yes --environment=production --token="${{ secrets.VERCEL_TOKEN }}"
          vercel deploy --prebuilt --prod --token="${{ secrets.VERCEL_TOKEN }}"

  deployment-summary:
    name: Deployment summary
    runs-on: ubuntu-latest
    needs: deploy-vercel
    if: always()

    steps:
      - name: Summarize deployment status
        run: |
          if [ "${{ needs.deploy-vercel.result }}" = "skipped" ]; then
            echo "Vercel deployment skipped because one or more required secrets are not configured."
          elif [ "${{ needs.deploy-vercel.result }}" = "success" ]; then
            echo "Vercel deployment completed successfully."
          else
            echo "Vercel deployment failed."
            exit 1
          fi
